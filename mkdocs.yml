site_name: OpenHosta
site_description: The semantic layer for Python — AI-native functions from docstrings.
site_url: https://hand-e-fr.github.io/OpenHosta
repo_url: https://github.com/hand-e-fr/OpenHosta
repo_name: hand-e-fr/OpenHosta
edit_uri: edit/main/docs/

theme:
  name: material
  logo: logo.png
  favicon: logo.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - First Steps: getting_started.md
  - Core Functions:
    - emulate & Variants: core_functions.md
    - Generative Callables: callables.md
  - Types & Validation:
    - Supported Types: types_and_pydantic.md
    - Guarded Types: guarded.md
    - Type Compatibility Matrix: compat_matrix_types.md
  - Advanced:
    - Models & Setup: models_and_setup.md
    - Pipeline Architecture: pipeline.md
    - Pipeline Steps: pipeline_steps.md
    - Safe Context & Uncertainty: safe_context_and_uncertainty.md
    - PMAC Concept: PMAC.md
  - Cookbook:
    - Text Classification: examples/text_classification.md
    - Data Extraction: examples/data_extraction.md
    - Parallel Processing: parallel_processing.md
    - Local OCR with Ollama: examples/ocr_local_ollama.md
  - Compatibility:
    - Python Versions: compatibility_table.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/hand-e-fr/OpenHosta
